<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HealthBridgeSA — Clinical Dashboard</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,400;0,500;0,600;0,700&family=JetBrains+Mono:wght@400;500&display=swap');

  :root {
    --bg: #0c0f14;
    --surface: #161a22;
    --surface-2: #1e2330;
    --border: #2a2f3c;
    --text: #e4e7ec;
    --text-muted: #8b92a5;
    --accent: #3b82f6;
    --red: #ef4444;
    --orange: #f97316;
    --yellow: #eab308;
    --green: #22c55e;
    --blue: #3b82f6;
    --red-bg: #ef44441a;
    --orange-bg: #f973161a;
    --yellow-bg: #eab3081a;
    --green-bg: #22c55e1a;
    --blue-bg: #3b82f61a;
    --radius: 10px;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'DM Sans', -apple-system, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
  }

  .header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 16px 24px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    position: sticky;
    top: 0;
    z-index: 100;
  }

  .header h1 {
    font-size: 18px;
    font-weight: 700;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .header .live-dot {
    width: 8px;
    height: 8px;
    background: var(--green);
    border-radius: 50%;
    animation: pulse 2s infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.4; }
  }

  .header .meta {
    font-size: 13px;
    color: var(--text-muted);
    font-family: 'JetBrains Mono', monospace;
  }

  .container {
    max-width: 1400px;
    margin: 0 auto;
    padding: 20px 24px;
  }

  /* ── Stats Grid ── */
  .stats-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
    gap: 12px;
    margin-bottom: 24px;
  }

  .stat-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 16px;
  }

  .stat-card .label {
    font-size: 12px;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.05em;
    margin-bottom: 6px;
  }

  .stat-card .value {
    font-size: 28px;
    font-weight: 700;
    font-family: 'JetBrains Mono', monospace;
  }

  .stat-card .sub {
    font-size: 11px;
    color: var(--text-muted);
    margin-top: 4px;
  }

  /* ── Triage Level Bars ── */
  .triage-bars {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 20px;
    margin-bottom: 24px;
  }

  .triage-bars h2 {
    font-size: 14px;
    font-weight: 600;
    margin-bottom: 16px;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.05em;
  }

  .bar-row {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 10px;
  }

  .bar-label {
    width: 70px;
    font-size: 12px;
    font-weight: 600;
    font-family: 'JetBrains Mono', monospace;
  }

  .bar-track {
    flex: 1;
    height: 28px;
    background: var(--surface-2);
    border-radius: 6px;
    overflow: hidden;
    position: relative;
  }

  .bar-fill {
    height: 100%;
    border-radius: 6px;
    transition: width 0.6s ease;
    display: flex;
    align-items: center;
    padding-left: 10px;
    font-size: 12px;
    font-weight: 600;
    font-family: 'JetBrains Mono', monospace;
    min-width: fit-content;
  }

  .bar-count {
    width: 40px;
    text-align: right;
    font-size: 13px;
    font-weight: 600;
    font-family: 'JetBrains Mono', monospace;
  }

  /* ── Sections ── */
  .section {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    margin-bottom: 24px;
    overflow: hidden;
  }

  .section-header {
    padding: 16px 20px;
    border-bottom: 1px solid var(--border);
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .section-header h2 {
    font-size: 14px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    color: var(--text-muted);
  }

  .badge {
    background: var(--red);
    color: white;
    font-size: 11px;
    font-weight: 700;
    padding: 2px 8px;
    border-radius: 999px;
    font-family: 'JetBrains Mono', monospace;
  }

  /* ── Table ── */
  .table-wrap { overflow-x: auto; }

  table {
    width: 100%;
    border-collapse: collapse;
    font-size: 13px;
  }

  th {
    text-align: left;
    padding: 10px 16px;
    font-size: 11px;
    font-weight: 600;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.04em;
    border-bottom: 1px solid var(--border);
    white-space: nowrap;
  }

  td {
    padding: 10px 16px;
    border-bottom: 1px solid var(--border);
    vertical-align: top;
  }

  tr:last-child td { border-bottom: none; }

  tr:hover { background: var(--surface-2); }

  .level-pill {
    display: inline-block;
    padding: 2px 10px;
    border-radius: 999px;
    font-size: 11px;
    font-weight: 700;
    font-family: 'JetBrains Mono', monospace;
  }

  .level-RED    { background: var(--red-bg); color: var(--red); }
  .level-ORANGE { background: var(--orange-bg); color: var(--orange); }
  .level-YELLOW { background: var(--yellow-bg); color: var(--yellow); }
  .level-GREEN  { background: var(--green-bg); color: var(--green); }
  .level-BLUE   { background: var(--blue-bg); color: var(--blue); }
  .level-HUMAN_REQUEST { background: #a855f71a; color: #a855f7; }
  .level-RECHECK { background: var(--orange-bg); color: var(--orange); }

  .conf-HIGH   { color: var(--green); }
  .conf-MEDIUM { color: var(--yellow); }
  .conf-LOW    { color: var(--red); }

  .btn {
    padding: 5px 14px;
    border-radius: 6px;
    border: 1px solid var(--border);
    background: var(--surface-2);
    color: var(--text);
    font-size: 12px;
    font-weight: 500;
    cursor: pointer;
    transition: background 0.15s;
  }

  .btn:hover { background: var(--border); }

  .btn-primary {
    background: var(--accent);
    border-color: var(--accent);
    color: white;
  }

  .btn-primary:hover { background: #2563eb; }

  .empty-state {
    padding: 40px;
    text-align: center;
    color: var(--text-muted);
    font-size: 14px;
  }

  .tabs {
    display: flex;
    gap: 0;
    border-bottom: 1px solid var(--border);
    padding: 0 20px;
  }

  .tab {
    padding: 12px 16px;
    font-size: 13px;
    font-weight: 500;
    color: var(--text-muted);
    cursor: pointer;
    border-bottom: 2px solid transparent;
    transition: all 0.15s;
  }

  .tab:hover { color: var(--text); }
  .tab.active { color: var(--text); border-bottom-color: var(--accent); }

  .summary-text {
    max-width: 300px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .time-ago {
    color: var(--text-muted);
    font-size: 12px;
    font-family: 'JetBrains Mono', monospace;
  }

  @media (max-width: 768px) {
    .stats-grid { grid-template-columns: repeat(2, 1fr); }
    .container { padding: 12px; }
    .header { padding: 12px 16px; }
    th, td { padding: 8px 10px; font-size: 12px; }
  }
</style>
</head>
<body>

<div class="header">
  <h1>
    <span class="live-dot"></span>
    HealthBridgeSA Dashboard
  </h1>
  <div style="display:flex;align-items:center;gap:16px">
    <span class="meta" id="lastUpdated">Loading...</span>
    <a href="/logout" class="btn" style="text-decoration:none;font-size:12px">Logout</a>
  </div>
</div>

<div class="container">
  <!-- Stats -->
  <div class="stats-grid" id="statsGrid">
    <div class="stat-card"><div class="label">Total Triages</div><div class="value" id="statTotal">—</div></div>
    <div class="stat-card"><div class="label">Last 24 Hours</div><div class="value" id="stat24h">—</div></div>
    <div class="stat-card"><div class="label">Pending Escalations</div><div class="value" id="statEsc">—</div><div class="sub">Needs human review</div></div>
    <div class="stat-card"><div class="label">RED Cases (24h)</div><div class="value" id="statRed" style="color:var(--red)">—</div></div>
  </div>

  <!-- Triage Level Distribution -->
  <div class="triage-bars">
    <h2>Triage Level Distribution</h2>
    <div id="triageBars"></div>
  </div>

  <!-- Tabs: Escalations / Recent Logs / Facilities -->
  <div class="section">
    <div class="tabs">
      <div class="tab active" data-tab="escalations">
        🚨 Escalations <span class="badge" id="escBadge" style="display:none">0</span>
      </div>
      <div class="tab" data-tab="logs">📋 Recent Logs</div>
      <div class="tab" data-tab="facilities">🏥 Facilities</div>
      <div class="tab" data-tab="followups">🔔 Follow-ups</div>
    </div>

    <div class="table-wrap" id="tabContent">
      <div class="empty-state">Loading...</div>
    </div>
  </div>
</div>

<script>
const API_BASE = window.location.origin;
let currentTab = 'escalations';

// ── Tabs ──
document.querySelectorAll('.tab').forEach(tab => {
  tab.addEventListener('click', () => {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    tab.classList.add('active');
    currentTab = tab.dataset.tab;
    renderTab();
  });
});

// ── Time formatting ──
function timeAgo(ts) {
  const diff = Date.now() - new Date(ts).getTime();
  const mins = Math.floor(diff / 60000);
  if (mins < 1) return 'just now';
  if (mins < 60) return `${mins}m ago`;
  const hrs = Math.floor(mins / 60);
  if (hrs < 24) return `${hrs}h ago`;
  const days = Math.floor(hrs / 24);
  return `${days}d ago`;
}

// ── Data fetching ──
let statsData = null;
let escalationsData = [];
let logsData = [];
let facilitiesData = [];
let followupsData = [];

async function authFetch(url) {
  const r = await fetch(url);
  if (r.status === 401) { window.location.href = '/login'; throw new Error('Unauthorized'); }
  return r.json();
}

async function fetchAll() {
  try {
    const [stats, esc, escCount, logs, fac, fups] = await Promise.all([
      authFetch(`${API_BASE}/api/stats`),
      authFetch(`${API_BASE}/api/escalations`),
      authFetch(`${API_BASE}/api/escalations/count`),
      authFetch(`${API_BASE}/api/logs?limit=50`),
      authFetch(`${API_BASE}/api/facilities`),
      authFetch(`${API_BASE}/api/follow-ups`),
    ]);

    statsData = stats;
    escalationsData = esc;
    logsData = logs;
    facilitiesData = fac;
    followupsData = fups;

    renderStats(stats, escCount.count);
    renderTriageBars(stats.byLevel || {});
    renderTab();

    document.getElementById('lastUpdated').textContent =
      'Updated ' + new Date().toLocaleTimeString();

  } catch (err) {
    console.error('Fetch error:', err);
  }
}

// ── Render stats cards ──
function renderStats(stats, escCount) {
  document.getElementById('statTotal').textContent = stats.total || 0;
  document.getElementById('stat24h').textContent = stats.last24h || 0;
  document.getElementById('statEsc').textContent = escCount || 0;
  document.getElementById('statRed').textContent = stats.byLevel?.RED || 0;

  const badge = document.getElementById('escBadge');
  if (escCount > 0) {
    badge.textContent = escCount;
    badge.style.display = 'inline';
  } else {
    badge.style.display = 'none';
  }
}

// ── Render triage bars ──
function renderTriageBars(byLevel) {
  const container = document.getElementById('triageBars');
  const levels = [
    { key: 'RED', color: 'var(--red)', bg: 'var(--red-bg)' },
    { key: 'ORANGE', color: 'var(--orange)', bg: 'var(--orange-bg)' },
    { key: 'YELLOW', color: 'var(--yellow)', bg: 'var(--yellow-bg)' },
    { key: 'GREEN', color: 'var(--green)', bg: 'var(--green-bg)' },
    { key: 'BLUE', color: 'var(--blue)', bg: 'var(--blue-bg)' },
  ];

  const total = Object.values(byLevel).reduce((s, v) => s + v, 0) || 1;

  container.innerHTML = levels.map(l => {
    const count = byLevel[l.key] || 0;
    const pct = Math.max(2, (count / total) * 100);
    return `
      <div class="bar-row">
        <span class="bar-label" style="color:${l.color}">${l.key}</span>
        <div class="bar-track">
          <div class="bar-fill" style="width:${pct}%; background:${l.bg}; color:${l.color}">
            ${count > 0 ? count : ''}
          </div>
        </div>
        <span class="bar-count">${count}</span>
      </div>`;
  }).join('');
}

// ── Render tab content ──
function renderTab() {
  const container = document.getElementById('tabContent');

  if (currentTab === 'escalations') {
    if (escalationsData.length === 0) {
      container.innerHTML = '<div class="empty-state">No pending escalations ✅</div>';
      return;
    }
    container.innerHTML = `<table>
      <tr>
        <th>Time</th><th>Level</th><th>Reason</th><th>Summary</th><th>Lang</th><th>Confidence</th><th>Action</th>
      </tr>
      ${escalationsData.map(e => `
        <tr>
          <td class="time-ago">${timeAgo(e.created_at)}</td>
          <td><span class="level-pill level-${e.triage_level}">${e.triage_level}</span></td>
          <td style="font-size:12px">${e.escalation_reason || '—'}</td>
          <td class="summary-text" title="${esc(e.english_summary || e.original_message || '')}">${esc(e.english_summary || e.original_message || '—')}</td>
          <td>${e.language || '—'}</td>
          <td class="conf-${e.confidence || 'LOW'}">${e.confidence || '—'}</td>
          <td><button class="btn btn-primary" onclick="markReviewed(${e.id})">✓ Review</button></td>
        </tr>
      `).join('')}
    </table>`;
    return;
  }

  if (currentTab === 'logs') {
    if (logsData.length === 0) {
      container.innerHTML = '<div class="empty-state">No triage logs yet.</div>';
      return;
    }
    container.innerHTML = `<table>
      <tr>
        <th>Time</th><th>Level</th><th>Method</th><th>Category</th><th>Summary</th><th>Lang</th><th>Confidence</th><th>Facility</th>
      </tr>
      ${logsData.map(l => `
        <tr>
          <td class="time-ago">${timeAgo(l.created_at)}</td>
          <td><span class="level-pill level-${l.triage_level}">${l.triage_level}</span></td>
          <td>${l.method || '—'}</td>
          <td>${l.category || '—'}</td>
          <td class="summary-text" title="${esc(l.english_summary || l.original_message || '')}">${esc(l.english_summary || l.original_message || '—')}</td>
          <td>${l.language || '—'}</td>
          <td class="conf-${l.confidence || ''}">${l.confidence || '—'}</td>
          <td>${l.facility_name || '—'}</td>
        </tr>
      `).join('')}
    </table>`;
    return;
  }

  if (currentTab === 'facilities') {
    container.innerHTML = `<table>
      <tr>
        <th>Name</th><th>Type</th><th>Queue</th><th>Capacity</th><th>Wait (min)</th><th>Address</th>
      </tr>
      ${facilitiesData.map(f => {
        const load = f.capacity > 0 ? (f.current_queue / f.capacity * 100).toFixed(0) : 0;
        const loadColor = load > 80 ? 'var(--red)' : load > 50 ? 'var(--yellow)' : 'var(--green)';
        return `
          <tr>
            <td style="font-weight:600">${f.name}</td>
            <td>${f.type}</td>
            <td style="color:${loadColor}; font-weight:600">${f.current_queue}</td>
            <td>${f.capacity}</td>
            <td>${f.wait_time_minutes}</td>
            <td style="color:var(--text-muted)">${f.address || '—'}</td>
          </tr>`;
      }).join('')}
    </table>`;
    return;
  }

  if (currentTab === 'followups') {
    if (followupsData.length === 0) {
      container.innerHTML = '<div class="empty-state">No follow-ups scheduled yet.</div>';
      return;
    }
    container.innerHTML = `<table>
      <tr>
        <th>Scheduled</th><th>Status</th><th>Level</th><th>Response</th><th>Sent</th><th>Completed</th>
      </tr>
      ${followupsData.map(f => {
        const statusColor = f.status === 'completed' ? 'var(--green)'
          : f.status === 'sent' ? 'var(--yellow)'
          : f.status === 'pending' ? 'var(--text-muted)' : 'var(--red)';
        const responseMap = { '1': 'Better', '2': 'Same', '3': 'Worse', '4': 'Visited facility' };
        return `
          <tr>
            <td class="time-ago">${timeAgo(f.scheduled_at)}</td>
            <td style="color:${statusColor}; font-weight:600; text-transform:uppercase; font-size:11px">${f.status}</td>
            <td><span class="level-pill level-${f.triage_level}">${f.triage_level}</span></td>
            <td>${responseMap[f.response] || f.response || '—'}</td>
            <td class="time-ago">${f.sent_at ? timeAgo(f.sent_at) : '—'}</td>
            <td class="time-ago">${f.completed_at ? timeAgo(f.completed_at) : '—'}</td>
          </tr>`;
      }).join('')}
    </table>`;
    return;
  }
}

function esc(str) {
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

async function markReviewed(id) {
  try {
    await fetch(`${API_BASE}/api/escalations/${id}/review`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ reviewed_by: 'dashboard_user' }),
    });
    fetchAll();
  } catch (err) {
    console.error('Review error:', err);
  }
}

// ── Init + Auto-refresh ──
fetchAll();
setInterval(fetchAll, 30000); // Refresh every 30s
</script>
</body>
</html>
